<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Project</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f4ed;
    --ink: #132020;
    --muted: #5a6661;
    --panel: #fffdf6;
    --line: #d5d8cb;
    --brand: #0f8f7d;
    --brand-2: #e19f41;
    --error: #a73727;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1000px 500px at 10% -10%, rgba(15,143,125,0.16), transparent 60%),
      radial-gradient(900px 450px at 100% 0%, rgba(225,159,65,0.16), transparent 55%),
      var(--bg);
    min-height: 100vh;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 50px;
  }

  .hero {
    margin-bottom: 24px;
  }

  .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    background: rgba(255, 253, 246, 0.75);
  }

  h1 {
    margin: 14px 0 8px;
    font-size: clamp(28px, 6vw, 44px);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin: 0;
    color: var(--muted);
    max-width: 720px;
    font-size: 16px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
    overflow: hidden;
  }

  .card-body {
    padding: 18px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  textarea, input[type="text"] {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    background: #fff;
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    outline: none;
  }

  textarea {
    resize: vertical;
    min-height: 140px;
    line-height: 1.6;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(15,143,125,0.12);
  }

  .actions {
    margin-top: 14px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  button, .button-link {
    border: 0;
    border-radius: 12px;
    padding: 11px 16px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  #runBtn {
    background: var(--ink);
    color: #fff;
  }

  #runBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #downloadBtn {
    background: var(--brand);
    color: #fff;
    display: none;
  }

  .status {
    margin-top: 18px;
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 12px;
    background: #fff;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  #statusText {
    font-size: 14px;
    color: var(--muted);
  }

  #statusPct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .bar {
    height: 10px;
    border-radius: 999px;
    background: #edf1e7;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--brand), var(--brand-2));
    transition: width .4s ease;
  }

  .results {
    margin-top: 16px;
    display: none;
  }

  .results h2 {
    margin: 0 0 8px;
    font-size: 22px;
  }

  .meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin: 12px 0 16px;
  }

  .chip {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    background: #fff;
  }

  .chip .k {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .chip .v {
    margin-top: 4px;
    font-weight: 700;
    font-size: 15px;
  }

  .preview-wrap {
    margin-top: 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }

  iframe {
    width: 100%;
    min-height: 420px;
    border: 0;
    background: #fff;
  }

  #errorBox {
    margin-top: 14px;
    color: var(--error);
    font-size: 14px;
    display: none;
    background: #fff4f2;
    border: 1px solid #f3c7c0;
    border-radius: 12px;
    padding: 10px 12px;
  }

  details {
    margin-top: 12px;
  }

  details summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 720px) {
    .page { padding: 18px 14px 40px; }
    .card-body { padding: 14px; }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="badge">Prompt to Product</span>
      <h1>Describe what you want built.</h1>
      <p class="subtitle">You provide a plain-language request. The system creates a project and returns a downloadable code bundle when ready.</p>
    </section>

    <section class="card">
      <div class="card-body">
        <label for="taskInput">Project Request</label>
        <textarea id="taskInput" placeholder="Example: Build a booking dashboard with auth, calendar views, and API endpoints for appointments."></textarea>

        <details>
          <summary>Advanced settings</summary>
          <div style="margin-top:10px">
            <label for="repoPath">Repository Path (optional)</label>
            <input id="repoPath" type="text" placeholder="./sample_repo" value="./sample_repo">
          </div>
        </details>

        <div class="actions">
          <button id="runBtn" onclick="startBuild()">Generate Project</button>
          <a id="downloadBtn" class="button-link" href="#" download>Download Code (.zip)</a>
        </div>

        <div class="status" id="statusCard" style="display:none">
          <div class="status-row">
            <div id="statusText">Starting...</div>
            <div id="statusPct">0%</div>
          </div>
          <div class="bar"><div id="progressFill" class="bar-fill"></div></div>
        </div>

        <div id="errorBox"></div>

        <section id="results" class="results">
          <h2 id="resultTitle">Project Ready</h2>
          <p id="resultSummary" style="color:var(--muted)"></p>
          <div class="meta" id="metaGrid"></div>
          <div id="previewWrap" class="preview-wrap">
            <iframe id="previewFrame" title="Generated preview"></iframe>
          </div>
        </section>
      </div>
    </section>
  </main>

<script>
  let currentJobId = null;
  let pollTimer = null;

  function setStatus(message, progress) {
    const card = document.getElementById('statusCard');
    const text = document.getElementById('statusText');
    const pct = document.getElementById('statusPct');
    const fill = document.getElementById('progressFill');

    card.style.display = 'block';
    text.textContent = message;
    const safeProgress = Math.max(0, Math.min(100, Number(progress || 0)));
    pct.textContent = `${safeProgress}%`;
    fill.style.width = `${safeProgress}%`;
  }

  function showError(message) {
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = message;
  }

  function clearError() {
    const box = document.getElementById('errorBox');
    box.style.display = 'none';
    box.textContent = '';
  }

  async function parseApiResponse(res) {
    const raw = await res.text();
    let payload = null;

    try {
      payload = raw ? JSON.parse(raw) : null;
    } catch {
      payload = null;
    }

    if (!res.ok) {
      const jsonError = payload && typeof payload.error === 'string' ? payload.error : '';
      const textError = raw ? raw.slice(0, 400) : '';
      const details = jsonError || textError || `HTTP ${res.status}`;
      throw new Error(details);
    }

    return payload || {};
  }

  function phaseLabel(phase) {
    const map = {
      queued: 'Preparing your request...',
      indexing: 'Reading project context...',
      intent: 'Understanding requirements...',
      knowledge: 'Collecting implementation knowledge...',
      synthesis: 'Designing the solution...',
      code_context: 'Inspecting related code...',
      planning: 'Building implementation plan...',
      executing: 'Generating project code...',
      review: 'Validating quality...',
      tests: 'Preparing test suite...',
      preview: 'Building preview...',
      packaging: 'Packaging download bundle...',
      complete: 'Done.',
      failed: 'Build failed.',
    };
    return map[phase] || 'Working...';
  }

  async function startBuild() {
    const task = document.getElementById('taskInput').value.trim();
    const repoPath = document.getElementById('repoPath').value.trim();

    if (!task) {
      showError('Please enter your project request first.');
      return;
    }

    clearError();
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('runBtn').disabled = true;

    if (pollTimer) clearTimeout(pollTimer);

    try {
      setStatus('Submitting request...', 2);
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task, repoPath })
      });

      const payload = await parseApiResponse(res);
      currentJobId = payload.jobId;
      if (!currentJobId) throw new Error('No job id returned by server.');

      await pollJob();
    } catch (err) {
      document.getElementById('runBtn').disabled = false;
      showError(err.message || 'Unable to start generation.');
    }
  }

  async function pollJob() {
    if (!currentJobId) return;

    try {
      const res = await fetch(`/api/job/${currentJobId}`);
      const data = await parseApiResponse(res);

      setStatus(phaseLabel(data.phase), data.progress || 0);

      if (data.status === 'failed') {
        document.getElementById('runBtn').disabled = false;
        showError(data.error || 'Generation failed.');
        return;
      }

      if (data.status === 'complete') {
        document.getElementById('runBtn').disabled = false;
        renderResults(data.results || {});
        return;
      }

      pollTimer = setTimeout(pollJob, 2500);
    } catch (err) {
      document.getElementById('runBtn').disabled = false;
      showError(err.message || 'Polling failed. Please try again.');
    }
  }

  function renderResults(results) {
    const panel = document.getElementById('results');
    const title = document.getElementById('resultTitle');
    const summary = document.getElementById('resultSummary');
    const metaGrid = document.getElementById('metaGrid');

    title.textContent = results.title || 'Project Ready';
    summary.textContent = results.summary || 'Your generated code is ready to download.';

    const meta = [
      { k: 'Steps', v: results.steps || 0 },
      { k: 'Agents', v: results.meta && results.meta.agentsUsed ? results.meta.agentsUsed : '-' },
      { k: 'Duration', v: results.meta && results.meta.duration ? results.meta.duration : '-' },
      { k: 'Tokens', v: results.meta && results.meta.totalTokens ? `${Math.round(results.meta.totalTokens / 1000)}k` : '-' }
    ];

    metaGrid.innerHTML = meta.map(item => `
      <div class="chip">
        <div class="k">${item.k}</div>
        <div class="v">${item.v}</div>
      </div>
    `).join('');

    const downloadBtn = document.getElementById('downloadBtn');
    if (results.bundleReady && results.bundleUrl) {
      downloadBtn.href = results.bundleUrl;
      downloadBtn.style.display = 'inline-flex';
    }

    if (results.previewPath) {
      const file = results.previewPath.split('/').pop();
      if (file) {
        document.getElementById('previewFrame').src = `/preview/${file}`;
        document.getElementById('previewWrap').style.display = 'block';
      }
    }

    panel.style.display = 'block';
  }
</script>
</body>
</html>
